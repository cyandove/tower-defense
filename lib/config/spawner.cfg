# spawner.cfg
# Configuration for the enemy spawner.
# Place this notecard in the spawner prim alongside spawner.lsl.

# Display name for the enemy type (informational only)
enemy_type_name=Basic Enemy

# Starting health for each enemy
enemy_health=100.0

# Movement speed in m/s
enemy_speed=2.0

# Number of enemies to spawn per wave (can be overridden by controller)
enemies_per_wave=5

# Seconds between each enemy spawn within a wave
spawn_interval=3.0
